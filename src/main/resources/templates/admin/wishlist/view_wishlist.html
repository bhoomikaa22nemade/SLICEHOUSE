<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">

<head>
<meta charset="UTF-8">
<title>My Wishlist</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* REMOVE default spacing issues */
body{
    margin:0;
    padding:0;
}

/* MAIN CONTENT AREA */
.page{
    padding:30px;
    background:#f5b400;
    min-height:100vh;
}

/* CARD BOX */
.container-box{
    background:#111;
    color:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* TITLE */
h2{
    color:#ffc107;
}

/* TABLE */
.table{
    color:white;
}

.table td{
    vertical-align: middle;
}

/* EMPTY STATE */
.empty{
    text-align:center;
    padding:40px;
    color:#aaa;
}

/* BUTTON SPACING */
.btn{
    margin-right:5px;
}

</style>

</head>

<body>

<div layout:fragment="content">

<div class="page">

<div class="container">

<div class="container-box">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>❤️ My Wishlist</h2>

    <a href="/" class="btn btn-light">
        ← Back to Menu
    </a>

</div>

<!-- TABLE -->
<table class="table table-bordered table-striped">

<thead class="table-dark">
<tr>
    <th>Pizza</th>
    <th>Category</th>
    <th>Price</th>
    <th>Actions</th>
</tr>
</thead>

<tbody>

<tr th:each="item : ${wishlistItems}">

    <!-- PIZZA -->
    <td th:text="${item.pizza.name}"></td>

    <!-- CATEGORY -->
    <td th:text="${item.pizza.category}"></td>

    <!-- ✅ FIXED PRICE -->
    <td>
        ₹ <span th:text="${item.pizza.discountedPrice != null ? item.pizza.discountedPrice : item.pizza.sellingPrice}"></span>
    </td>

    <!-- ACTIONS -->
    <td>

        <a th:href="@{/admin/wishlist/move-to-cart/{id}(id=${item.wishlistId})}"
           class="btn btn-success btn-sm">
           Move to Cart
        </a>

        <a th:href="@{/admin/wishlist/delete/{id}(id=${item.wishlistId})}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Remove from wishlist?')">
           Delete
        </a>

    </td>

</tr>

<!-- EMPTY -->
<tr th:if="${wishlistItems == null || wishlistItems.isEmpty()}">
    <td colspan="4" class="empty">
        No items in your wishlist 💔
    </td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</body>
</html>
