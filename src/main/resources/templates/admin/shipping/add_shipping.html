<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">

<head>
<meta charset="UTF-8">
<title>Add Shipping</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.page{
    background:#f5b400;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.form-box{
    width:100%;
    max-width:600px;   /* 🔥 makes form bigger */
    background:#111;
    padding:35px;
    border-radius:20px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
    color:#ffc107;
    text-align:center;
    margin-bottom:25px;
}

.form-control{
    height:45px;
    font-size:15px;
}

button{
    height:45px;
    font-size:16px;
    font-weight:500;
}

</style>

</head>

<body>

<div layout:fragment="content">

<div class="page">

<div class="form-box">

<h2>🚚 Add Shipping</h2>

<form th:action="@{/admin/shipping/save}" 
      th:object="${shipping}" 
      method="post">

    <!-- ORDER ID -->
    <input type="hidden" th:field="*{order.id}"/>

    <!-- COURIER -->
    <label>Courier Service</label>
    <input type="text" th:field="*{courierService}"
           class="form-control mb-3"
           placeholder="Enter courier name"/>

    <!-- TRACKING -->
    <label>Tracking Number</label>
    <input type="text" th:field="*{trackingNumber}"
           class="form-control mb-3"
           placeholder="Enter tracking number"/>

    <!-- STATUS -->
    <label>Status</label>
    <select th:field="*{shippingStatus}" class="form-control mb-3">
        <option value="Shipped">Shipped</option>
        <option value="In Transit">In Transit</option>
        <option value="Delivered">Delivered</option>
    </select>

    <!-- COST -->
    <label>Shipping Cost</label>
    <input type="number" th:field="*{shippingCost}"
           class="form-control mb-4"
           placeholder="Enter cost"/>

    <!-- BUTTON -->
    <button type="submit" class="btn btn-success w-100">
        Save Shipping
    </button>

</form>

</div>

</div>

</div>

</body>
</html>
