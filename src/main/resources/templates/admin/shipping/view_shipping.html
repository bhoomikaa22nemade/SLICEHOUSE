<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">

<head>
<meta charset="UTF-8">
<title>Shipping Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.page{
    padding:30px;
    background:#f5b400;
    min-height:100vh;
}

.container-box{
    background:#111;
    color:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
    color:#ffc107;
}

.table{
    color:white;
}

.table td, .table th{
    vertical-align: middle;
    text-align: center;
}

.btn{
    margin-right:5px;
}

</style>

</head>

<body>

<div layout:fragment="content">

<div class="page">

<div class="container">

<div class="container-box">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">🚚 Shipping Dashboard</h2>
    <a href="/admin/orders" class="btn btn-primary">
        + Add Shipping
    </a>
</div>

<table class="table table-bordered table-striped">

<thead class="table-dark">
<tr>
    <th>Order ID</th>
    <th>Courier</th>
    <th>Tracking</th>
    <th>Status</th>
    <th>Cost</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="s : ${shippingList}">

    <!-- ✅ Order ID -->
    <td th:text="${s.order.id}"></td>

    <!-- ✅ Courier -->
    <td th:text="${s.courierService}"></td>

    <!-- ✅ Tracking -->
    <td th:text="${s.trackingNumber}"></td>

    <!-- ✅ Status -->
    <td>
        <span class="badge"
              th:classappend="${s.shippingStatus == 'Delivered'} ? ' bg-success' :
                             (${s.shippingStatus == 'Shipped'} ? ' bg-primary' : ' bg-warning')"
              th:text="${s.shippingStatus}">
        </span>
    </td>

    <!-- ✅ Cost -->
    <td>
        ₹ <span th:text="${s.shippingCost}"></span>
    </td>

    <!-- ✅ Delete -->
    <td>
        <a th:href="@{/admin/shipping/delete/{id}(id=${s.shippingId})}"
           class="btn btn-danger btn-sm">
           Delete
        </a>
    </td>

</tr>

<!-- EMPTY -->
<tr th:if="${shippingList == null || shippingList.isEmpty()}">
    <td colspan="6" class="text-center">
        No shipping data found 🚫
    </td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</body>
</html>
