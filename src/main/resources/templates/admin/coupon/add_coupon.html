<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Add Coupon</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.page{
    background:#f5b400;
    min-height:100vh;
    padding:40px;
}

.container-box{
    max-width:600px;
    margin:auto;
    background:#111;
    color:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
    color:#ffc107;
    margin-bottom:20px;
}

label{
    margin-bottom:5px;
}

.form-control{
    border-radius:10px;
}

.btn{
    margin-top:10px;
}

</style>

</head>

<body>

<div class="page">

<div class="container-box">

<h2>➕ Add Coupon</h2>

<form th:action="@{/admin/coupon/save}" th:object="${coupon}" method="post">

    <div class="mb-3">
        <label>Coupon Code</label>
        <input type="text" th:field="*{code}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Type</label>
        <select th:field="*{type}" class="form-control">
            <option value="PERCENT">PERCENT</option>
            <option value="FLAT">FLAT</option>
            <option value="DELIVERY">DELIVERY</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Value</label>
        <input type="number" th:field="*{value}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Minimum Amount</label>
        <input type="number" th:field="*{minAmount}" class="form-control">
    </div>

    <button type="submit" class="btn btn-success w-100">Save Coupon</button>

    <a th:href="@{/admin/coupon}" class="btn btn-secondary w-100">Back</a>

</form>

</div>

</div>

</body>
</html>
