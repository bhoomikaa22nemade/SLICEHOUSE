<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">

<head>
<meta charset="UTF-8">
<title>Review Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.page{
    background:#f5b400;
    min-height:100vh;
    padding:40px;
}

.container-box{
    max-width:1200px;
    margin:auto;
    background:#111;
    color:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
    color:#ffc107;
    margin-bottom:20px;
}

/* TABLE */
.table{
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.table th{
    background:#222;
    color:white;
    text-align:center;
    padding:14px;
}

.table td{
    text-align:center;
    padding:12px;
}

/* REVIEW TEXT */
.review-text{
    max-width:250px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* BADGE */
.badge{
    padding:6px 10px;
    font-size:12px;
}

/* BUTTONS */
.btn-sm{
    padding:5px 10px;
    font-size:13px;
    margin-right:5px;
}

</style>

</head>

<body>

<div layout:fragment="content">

<div class="page">
<div class="container">
<div class="container-box">

<h2>⭐ Review Management</h2>

<table class="table table-bordered table-striped">

<thead>
<tr>
    <th>User</th>
    <th>Pizza</th>
    <th>Rating</th>
    <th>Review</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="r : ${reviews}">

    <!-- USER -->
    <td th:text="${r.user.username}"></td>

    <!-- PIZZA -->
    <td th:text="${r.pizza.name}"></td>

    <!-- RATING -->
    <td>⭐ <span th:text="${r.rating}"></span></td>

    <!-- REVIEW -->
    <td class="review-text" th:text="${r.reviewText}"></td>

    <!-- STATUS -->
    <td>
        <span th:text="${r.status ? 'Approved' : 'Pending'}"
              th:classappend="${r.status} ? 'bg-success' : 'bg-warning text-dark'"
              class="badge">
        </span>
    </td>

    <!-- ACTION -->
    <td>

        <!-- APPROVE BUTTON (only if pending) -->
       <a th:if="${!r.status}"
   th:href="@{/review/approve/{id}(id=${r.reviewId})}"
   class="btn btn-success btn-sm">
   Approve
</a>

<a th:href="@{/review/delete/{id}(id=${r.reviewId})}"
   class="btn btn-danger btn-sm">
   Delete
</a>
    </td>

</tr>

<!-- EMPTY -->
<tr th:if="${reviews == null || reviews.isEmpty()}">
    <td colspan="6" class="text-center">No reviews found 🚫</td>
</tr>

</tbody>

</table>

</div>
</div>
</div>

</div>

</body>
</html>
